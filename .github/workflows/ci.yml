name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Dummy values for CI — tests mock all external services.
      ANTHROPIC_API_KEY: test_key
      TAVILY_API_KEY: test_key
      SUPABASE_URL: http://localhost:54321
      SUPABASE_ANON_KEY: test_anon_key
      LANGSMITH_API_KEY: test_key
      LANGSMITH_PROJECT: agentiq-ci
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test_secret_at_least_32_characters_long!!
      USE_MOCK_GMAIL: "true"
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run test suite
        run: pytest --tb=short -v --cov=backend --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend && npm ci
      # Build mode (-b) type-checks the referenced projects. Plain `tsc --noEmit`
      # is a no-op here because the root tsconfig is solution-style (files: []).
      - run: cd frontend && npx tsc -b
